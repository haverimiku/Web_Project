<!DOCTYPE html>
<html lang="fi">
<head>

<body>
    <h1>Portfolio etusivu</h1>

    <p>

    <p>Sivulla oltu sekunteina: <span id="timer">0</span></p>

    <script>
        const timerElement = document.getElementById('timer');
        let seconds = 0;
        setInterval(() => {
            seconds += 1;
            timerElement.textContent = seconds;
        }, 1000);
    </script>
